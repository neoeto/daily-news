name: ci

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: format check
        run: pnpm exec prettier --check "shared/src" "crawler/src" "crawler/test" "cli/src" "cli/test" "src" "*.{ts,json,mjs}"

      - name: typecheck
        run: pnpm typecheck

      - name: test
        run: pnpm test

      - name: build
        run: pnpm build

      - name: upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: dist
          retention-days: 7
