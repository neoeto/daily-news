name: daily-crawl

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: crawl
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_TRANSLATE_MODEL: ${{ secrets.LLM_TRANSLATE_MODEL }}
      LLM_TAG_MODEL: ${{ secrets.LLM_TAG_MODEL }}
      OUTPUT_BRANCH: news
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: switch to output branch (merge main code changes)
        run: |
          git config user.name "daily-news-bot"
          git config user.email "bot@users.noreply.github.com"
          if git show-ref --verify --quiet "refs/remotes/origin/${OUTPUT_BRANCH}"; then
            git checkout -B "${OUTPUT_BRANCH}" "origin/${OUTPUT_BRANCH}"
            git merge "origin/main" --no-edit
          else
            git checkout -b "${OUTPUT_BRANCH}"
          fi

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: test LLM endpoint
        env:
          LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_TRANSLATE_MODEL: ${{ secrets.LLM_TRANSLATE_MODEL }}
        run: |
          echo "base_url: ${LLM_BASE_URL}"
          echo "model: ${LLM_TRANSLATE_MODEL:-glm-4.5} (default if empty)"
          curl -s -w "\nHTTP %{http_code}\n" \
            "${LLM_BASE_URL}/chat/completions" \
            -H "Content-Type: application/json" \
            -H "Authorization: Bearer ${LLM_API_KEY}" \
            -d "{\"model\":\"${LLM_TRANSLATE_MODEL:-glm-4.5}\",\"messages\":[{\"role\":\"user\",\"content\":\"hi\"}]}" \
            | head -20

      - name: run crawler
        run: pnpm crawl

      - name: commit & push outputs
        run: |
          git add news configs runs
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore(news): daily crawl $(date -u +%Y-%m-%d)"
            git push origin "${OUTPUT_BRANCH}"
          fi
