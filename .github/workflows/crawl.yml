name: daily-crawl

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

concurrency:
  group: crawl
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    env:
      LLM_BASE_URL: ${{ secrets.LLM_BASE_URL }}
      LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
      LLM_TRANSLATE_MODEL: ${{ secrets.LLM_TRANSLATE_MODEL }}
      LLM_TAG_MODEL: ${{ secrets.LLM_TAG_MODEL }}
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: run crawler
        run: pnpm crawl

      - name: commit & push outputs
        run: |
          git config user.name "daily-news-bot"
          git config user.email "bot@users.noreply.github.com"
          git add news configs runs
          if git diff --cached --quiet; then
            echo "no changes to commit"
          else
            git commit -m "chore(news): daily crawl $(date -u +%Y-%m-%d)"
            git push
          fi
